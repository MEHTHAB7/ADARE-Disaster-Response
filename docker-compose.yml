version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
    restart: always

  frontend:
    build:
      context: ./ui
    ports:
      - "5173:4173"
    depends_on:
      - backend
    restart: always
